<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open in Obsidian</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #1e1e2e;
    color: #cdd6f4;
  }
  a.btn {
    display: inline-block;
    padding: 16px 32px;
    background: #7c3aed;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    margin-top: 16px;
  }
  p { color: #a6adc8; font-size: 14px; margin-top: 24px; }
</style>
</head>
<body>
<a class="btn" id="obslink" href="obsidian://open?vault=mb%20Obsidian%20Remote&file=PROJECTS%2FJob%20Prospecting%2FEmail%20Notifications">
  Open in Obsidian
</a>
<p>Job Prospecting / Email Notifications</p>
<script>
  // Desktop (non-touch): use the local vault name
  if (!('ontouchstart' in window)) {
    document.getElementById('obslink').href =
      "obsidian://open?vault=mb%20Obsidian%20Vault&file=PROJECTS%2FJob%20Prospecting%2FEmail%20Notifications";
    window.location = "obsidian://open?vault=mb%20Obsidian%20Vault&file=PROJECTS%2FJob%20Prospecting%2FEmail%20Notifications";
  }
  // Mobile: button href already points to mb Obsidian Remote
</script>
</body>
</html>
